<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATM - TM Events Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <style>
      input:focus,
      select:focus {
        outline: none;
        border-color: #3b82f6 !important;
        box-shadow: 0 0 0 1px #3b82f6;
      }
    </style>
  </head>
  <body
    class="bg-[#F8FAFC] dark:bg-[#0F172A] font-sans antialiased text-gray-800 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300"
  >
    <nav
      class="w-full bg-white dark:bg-[#1E293B] shadow-[0_4px_12px_rgba(0,0,0,0.02)] dark:shadow-[0_4px_12px_rgba(0,0,0,0.2)] border-b border-gray-100 dark:border-gray-800 px-4 sm:px-6 py-4 flex justify-center transition-colors duration-300 sticky top-0 z-50"
    >
      <div
        class="w-full max-w-6xl flex flex-col md:flex-row justify-between items-center gap-4"
      >
        <div
          onclick="showPage('home')"
          class="text-[#0A1128] dark:text-white font-bold text-xl tracking-tight select-none cursor-pointer"
        >
          TM Events Inventory
        </div>

        <div
          class="flex items-center justify-center md:justify-end gap-4 w-full md:w-auto flex-wrap sm:flex-nowrap"
        >
          <div class="flex items-center h-10">
            <input
              type="text"
              placeholder="Search for Event"
              class="h-full px-4 border border-gray-200 dark:border-gray-700 border-r-0 rounded-l-md text-sm text-gray-500 dark:text-gray-400 bg-white dark:bg-[#0F172A] placeholder-gray-400 dark:placeholder-gray-500 w-52 sm:w-60 transition-colors"
            />
            <button
              class="h-full px-4 border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#0F172A] rounded-r-md text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors flex items-center justify-center"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                ></path>
              </svg>
            </button>
          </div>

          <button
            id="theme-toggle"
            class="text-gray-400 dark:text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-2 transition-colors"
            aria-label="Toggle Theme"
          >
            <svg
              id="theme-toggle-sun"
              class="w-5 h-5 hidden dark:block"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
            <svg
              id="theme-toggle-moon"
              class="w-5 h-5 dark:hidden"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
              ></path>
            </svg>
          </button>

          <div
            class="flex items-center space-x-6 text-[15px] font-semibold tracking-wide pl-1"
          >
            <button
              id="nav-home"
              onclick="showPage('home')"
              class="text-blue-600 dark:text-blue-400 transition-colors duration-200"
            >
              Home
            </button>
            <button
              id="nav-add"
              onclick="showPage('add')"
              class="text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors duration-200 whitespace-nowrap"
            >
              Add Events
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main
      class="flex-grow flex flex-col items-center w-full max-w-7xl mx-auto px-4 sm:px-6 md:px-8 pt-8 pb-24"
    >
      <div id="page-home" class="w-full flex flex-col items-center">
        <div
          class="w-full max-w-[800px] rounded-2xl overflow-hidden shadow-md mb-10 dark:shadow-black/20"
        >
          <img
            src="masterimage.jpeg"
            alt="Ticketmaster Concert Crowd"
            class="w-full h-auto object-cover"
          />
        </div>

        <div
          id="metrics-container"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 w-full max-w-[800px] lg:max-w-6xl mb-10"
        >
          <div
            onclick="toggleRegistryView()"
            class="bg-white dark:bg-[#1E293B] hover:border-blue-400 dark:hover:border-blue-500 cursor-pointer rounded-2xl p-6 flex flex-col justify-between border border-gray-100 dark:border-gray-800 shadow-sm transition-all duration-300 select-none"
          >
            <span
              class="text-sm font-bold text-gray-500 dark:text-gray-400 block"
              >Total Active Events</span
            >
            <span
              id="counter-active"
              class="text-3xl font-black text-gray-900 dark:text-white mt-2"
              >0</span
            >
          </div>
          <div
            class="bg-white dark:bg-[#1E293B] rounded-2xl p-6 flex flex-col justify-between border border-gray-100 dark:border-gray-800 shadow-sm transition-all duration-300"
          >
            <span
              class="text-sm font-bold text-gray-500 dark:text-gray-400 block"
              >Total Broadcasted Events</span
            >
            <span
              id="counter-broadcast"
              class="text-3xl font-black text-gray-900 dark:text-white mt-2"
              >0</span
            >
          </div>
          <div
            class="bg-white dark:bg-[#1E293B] rounded-2xl p-6 flex flex-col justify-between border border-gray-100 dark:border-gray-800 shadow-sm transition-all duration-300"
          >
            <span
              class="text-sm font-bold text-gray-500 dark:text-gray-400 block"
              >Total UnBroadcasted Events</span
            >
            <span
              id="counter-unbroadcast"
              class="text-3xl font-black text-gray-900 dark:text-white mt-2"
              >0</span
            >
          </div>
          <div
            class="bg-white dark:bg-[#1E293B] rounded-2xl p-6 flex flex-col justify-between border border-gray-100 dark:border-gray-800 shadow-sm transition-all duration-300"
          >
            <span
              class="text-sm font-bold text-gray-500 dark:text-gray-400 block"
              >Upcoming (3 Days) Events</span
            >
            <span
              id="counter-upcoming"
              class="text-3xl font-black text-gray-900 dark:text-white mt-2"
              >0</span
            >
          </div>
        </div>

        <div
          id="registry-container"
          class="w-full max-w-[800px] lg:max-w-6xl bg-white dark:bg-[#1E293B] rounded-2xl border border-gray-100 dark:border-gray-800 p-6 shadow-sm mb-12 hidden"
        >
          <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-4">
            Current Event Registry
          </h3>
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr
                  class="border-b border-gray-100 dark:border-gray-700 text-xs font-bold text-gray-400 uppercase tracking-wider"
                >
                  <th class="pb-3 px-2">Event Detail</th>
                  <th class="pb-3 px-2">Venue</th>
                  <th class="pb-3 px-2">Mapping ID / Code</th>
                  <th class="pb-3 px-2 text-right">Actions</th>
                </tr>
              </thead>
              <tbody
                id="inventory-table-body"
                class="text-sm divide-y divide-gray-50 dark:divide-gray-800"
              ></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="page-add" class="w-full max-w-5xl hidden transition-all">
        <div class="flex items-center gap-3 mb-6">
          <button
            onclick="showPage('home')"
            class="p-2 bg-white dark:bg-[#1E293B] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-full border border-gray-200/60 dark:border-gray-700 shadow-sm transition-colors"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              ></path>
            </svg>
          </button>
          <div>
            <h2 class="text-xl font-bold text-gray-900 dark:text-white">
              Add New Event
            </h2>
            <p class="text-sm text-gray-400 dark:text-gray-500 mt-0.5">
              Fill in the details below to add a new event to the system.
            </p>
          </div>
        </div>

        <form
          id="event-form"
          class="bg-white dark:bg-[#1E293B] border border-gray-100 dark:border-gray-800 rounded-2xl p-6 sm:p-8 shadow-sm space-y-6"
        >
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >Event Name <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"
                    ></path>
                  </svg>
                </span>
                <input
                  type="text"
                  id="form-name"
                  required
                  placeholder="Enter event name"
                  class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >Event Mapping ID <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"
                    ></path>
                  </svg>
                </span>
                <input
                  type="text"
                  id="form-mapping-id"
                  required
                  placeholder="Enter event mapping ID"
                  class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >Venue Name <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
                    ></path>
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
                    ></path>
                  </svg>
                </span>
                <input
                  type="text"
                  id="form-venue"
                  required
                  placeholder="Enter venue name"
                  class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >Event ID <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
                    ></path>
                  </svg>
                </span>
                <input
                  type="text"
                  id="form-id"
                  required
                  placeholder="Enter event ID"
                  class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >Event Start Time <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 pointer-events-none"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    ></path>
                  </svg>
                </span>
                <input
                  type="datetime-local"
                  id="form-start"
                  required
                  class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >Transfer Date <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 pointer-events-none"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    ></path>
                  </svg>
                </span>
                <input
                  type="datetime-local"
                  id="form-transfer-date"
                  required
                  class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >List Cost Percentage <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
                  >%</span
                >
                <input
                  type="number"
                  id="form-cost"
                  required
                  min="0"
                  max="100"
                  placeholder="Enter list cost percentage"
                  class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
                >Event Status <span class="text-red-500">*</span></label
              >
              <select
                id="form-status"
                required
                class="w-full px-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 focus:outline-none"
              >
                <option value="" disabled selected>Select status</option>
                <option value="Active">Active</option>
                <option value="Pending">Pending</option>
              </select>
            </div>
          </div>

          <div>
            <label
              class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2"
              >Event URL <span class="text-red-500">*</span></label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"
                  ></path>
                </svg>
              </span>
              <input
                type="url"
                id="form-url"
                required
                placeholder="Enter event URL"
                class="w-full pl-11 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm bg-white dark:bg-[#0F172A] text-gray-800 dark:text-gray-100 placeholder-gray-400"
              />
            </div>
          </div>

          <div class="pt-2">
            <button
              type="submit"
              class="w-full bg-[#026CDF] hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition-all active:scale-[0.99] flex items-center justify-center gap-2 text-base"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"
                ></path>
              </svg>
              Active Event
            </button>
          </div>
        </form>
      </div>
    </main>

    <script>
      
      let eventsInventory =
        JSON.parse(localStorage.getItem("eventsData")) || [];

      const counterActiveEl = document.getElementById("counter-active");
      const counterBroadcastEl = document.getElementById("counter-broadcast");
      const counterUnbroadcastEl = document.getElementById(
        "counter-unbroadcast",
      );
      const counterUpcomingEl = document.getElementById("counter-upcoming");

      const registryContainer = document.getElementById("registry-container");
      const inventoryTableBody = document.getElementById(
        "inventory-table-body",
      );
      const eventForm = document.getElementById("event-form");

      function showPage(pageId) {
        const homePage = document.getElementById("page-home");
        const addPage = document.getElementById("page-add");
        const navHomeBtn = document.getElementById("nav-home");
        const navAddBtn = document.getElementById("nav-add");

        if (pageId === "home") {
          homePage.classList.remove("hidden");
          addPage.classList.add("hidden");
          navHomeBtn.className =
            "text-blue-600 dark:text-blue-400 transition-colors font-semibold";
          navAddBtn.className =
            "text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors font-semibold whitespace-nowrap";
          updateUI();
        } else {
          homePage.classList.add("hidden");
          addPage.classList.remove("hidden");
          navAddBtn.className =
            "text-blue-600 dark:text-blue-400 transition-colors font-semibold whitespace-nowrap";
          navHomeBtn.className =
            "text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors font-semibold";
        }
      }

      function toggleRegistryView() {
        if (registryContainer.classList.contains("hidden")) {
          registryContainer.classList.remove("hidden");
        } else {
          registryContainer.classList.add("hidden");
        }
      }

      eventForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const newEvent = {
          id: Date.now().toString(),
          name: document.getElementById("form-name").value,
          mappingId: document.getElementById("form-mapping-id").value,
          venue: document.getElementById("form-venue").value,
          eventIdCode: document.getElementById("form-id").value,
          startTime: document.getElementById("form-start").value,
          transferDate: document.getElementById("form-transfer-date").value,
          cost: document.getElementById("form-cost").value,
          status: document.getElementById("form-status").value,
          url: document.getElementById("form-url").value,
        };

        eventsInventory.push(newEvent);
        localStorage.setItem("eventsData", JSON.stringify(eventsInventory));

        eventForm.reset();
        showPage("home");
      });

      function deleteEvent(id) {
        eventsInventory = eventsInventory.filter((item) => item.id !== id);
        localStorage.setItem("eventsData", JSON.stringify(eventsInventory));
        updateUI();
      }

      
      function triggerBroadcast(id) {
       
      }

      function triggerActiveState(id) {
        
      }

      
      function updateUI() {
        const activeEventsCount = eventsInventory.filter(
          (e) => e.status === "Active",
        ).length;
        const pendingEventsCount = eventsInventory.filter(
          (e) => e.status === "Pending",
        ).length;

        const structuralNow = new Date().getTime();
        const threeDaysInMs = 3 * 24 * 60 * 60 * 1000;

        const upcomingEventsCount = eventsInventory.filter((e) => {
          if (!e.startTime) return false;
          const eventDateMs = new Date(e.startTime).getTime();
          const difference = eventDateMs - structuralNow;
          return difference > 0 && difference <= threeDaysInMs;
        }).length;

        counterActiveEl.textContent = activeEventsCount;
        counterBroadcastEl.textContent = activeEventsCount;
        counterUnbroadcastEl.textContent = pendingEventsCount;
        counterUpcomingEl.textContent = upcomingEventsCount;

        inventoryTableBody.innerHTML = "";

        if (eventsInventory.length === 0) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="4" class="py-8 text-center text-gray-400 dark:text-gray-500">No events registered in system inventory yet.</td>`;
          inventoryTableBody.appendChild(tr);
        } else {
          eventsInventory.forEach((item) => {
            const tr = document.createElement("tr");
            tr.className =
              "border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50/50 dark:hover:bg-slate-800/30 transition-colors";
            tr.innerHTML = `
                        <td class="py-4 px-2 font-semibold text-gray-900 dark:text-white">${item.name} <span class="block text-xs font-normal text-gray-400 mt-0.5">ID: ${item.eventIdCode}</span></td>
                        <td class="py-4 px-2 text-gray-600 dark:text-gray-300">${item.venue}</td>
                        <td class="py-4 px-2 font-mono text-xs text-gray-500 dark:text-gray-400">${item.mappingId}</td>
                        <td class="py-4 px-2 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <button onclick="triggerBroadcast('${item.id}')" class="text-xs font-semibold text-blue-500 hover:text-blue-700 bg-blue-50 dark:bg-blue-500/10 hover:bg-blue-100 px-2.5 py-1.5 rounded-md transition-colors">Broadcast</button>
                                <button onclick="triggerActiveState('${item.id}')" class="text-xs font-semibold text-green-500 hover:text-green-700 bg-green-50 dark:bg-green-500/10 hover:bg-green-100 px-2.5 py-1.5 rounded-md transition-colors">Active</button>
                                <button onclick="deleteEvent('${item.id}')" class="text-xs font-semibold text-red-500 hover:text-red-700 bg-red-50 dark:bg-red-500/10 hover:bg-red-100 px-2.5 py-1.5 rounded-md transition-colors">Delete</button>
                            </div>
                        </td>
                    `;
            inventoryTableBody.appendChild(tr);
          });
        }
      }

      
      const themeToggleBtn = document.getElementById("theme-toggle");
      themeToggleBtn.addEventListener("click", function () {
        if (document.documentElement.classList.contains("dark")) {
          document.documentElement.classList.remove("dark");
          localStorage.setItem("color-theme", "light");
        } else {
          document.documentElement.classList.add("dark");
          localStorage.setItem("color-theme", "dark");
        }
      });
      if (
        localStorage.getItem("color-theme") === "dark" ||
        (!("color-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }

      updateUI();
    </script>
  </body>
</html>
